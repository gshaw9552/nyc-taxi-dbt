version: 2

sources:
  - name: raw
    catalog: nyc_taxi
    schema: raw
    description: "Raw NYC Taxi data as loaded from NYC TLC public data"

    tables:
      - name: yellow_trips_raw
        description: "Raw yellow taxi trip records. One row per trip."
        config:
          loaded_at_field: tpep_pickup_datetime
          freshness:
            warn_after: {count: 25, period: hour}
            error_after: {count: 49, period: hour}
        columns:
          - name: tpep_pickup_datetime
            description: "Trip pickup timestamp"
          - name: tpep_dropoff_datetime
            description: "Trip dropoff timestamp"
          - name: passenger_count
            description: "Number of passengers (self-reported by driver)"
          - name: trip_distance
            description: "Trip distance in miles"
          - name: PULocationID
            description: "Pickup location ID (joins to taxi_zone_lookup)"
          - name: DOLocationID
            description: "Dropoff location ID (joins to taxi_zone_lookup)"
          - name: payment_type
            description: "1=Credit card, 2=Cash, 3=No charge, 4=Dispute, 5=Unknown, 6=Voided"
          - name: fare_amount
            description: "Base metered fare in USD"
          - name: tip_amount
            description: "Tip amount in USD (only populated for credit card payments)"
          - name: total_amount
            description: "Total charged to passenger in USD"

      - name: taxi_zone_lookup
        description: "Reference table mapping location IDs to borough and zone names"
        columns:
          - name: LocationID
            description: "Numeric location identifier"
          - name: Borough
            description: "NYC borough name"
          - name: Zone
            description: "Specific zone or neighborhood name"