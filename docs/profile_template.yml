# Copy this file to ~/.dbt/profiles.yml
# Set the three environment variables before running dbt

nyc_taxi_dbt:
  target: dev
  outputs:
    dev:
      type: databricks
      host: "{{ env_var('DATABRICKS_HOST') }}"
      http_path: "{{ env_var('DATABRICKS_HTTP_PATH') }}"
      token: "{{ env_var('DATABRICKS_TOKEN') }}"
      catalog: nyc_taxi
      schema: dev        # Change to your name for isolation (e.g. gaurav_dev)
      threads: 4
    prod:
      type: databricks
      host: "{{ env_var('DATABRICKS_HOST') }}"
      http_path: "{{ env_var('DATABRICKS_HTTP_PATH') }}"
      token: "{{ env_var('DATABRICKS_TOKEN') }}"
      catalog: nyc_taxi
      schema: prod
      threads: 4